# version: "3.9"

services:

  s:
    image: ubuntu:24.04
    container_name: s1
    privileged: true
    command: bash /start.sh
    volumes:
      - ./sender/start.sh:/start.sh

    networks:
      net_sr:
        ipv4_address: 10.0.1.10

  r:
    image: frrouting/frr:latest

    container_name: r1

    privileged: true

    cap_add:
      - NET_ADMIN
      - NET_RAW

    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.default.mc_forwarding: "1"


    volumes:
      - ./router/frr.conf:/etc/frr/frr.conf

    command: >
      sh -c "
      sysctl -w net.ipv4.ip_forward=1 &&
      /usr/lib/frr/docker-start
      "

    networks:
      net_sr:
      net_rx:

  x:
    image: ubuntu:24.04
    container_name: x1
    privileged: true

    command: bash /listen.sh

    volumes:
      - ./receiver/listen.sh:/listen.sh

    networks:
      net_rx:
        ipv4_address: 10.0.2.10

  y:
    image: ubuntu:24.04
    container_name: y1
    privileged: true

    command: bash /listen.sh

    volumes:
      - ./receiver/listen.sh:/listen.sh

    networks:
      net_rx:
        ipv4_address: 10.0.2.11


networks:

  net_sr:
    driver: bridge

    ipam:
      config:
        - subnet: 10.0.1.0/24

  net_rx:
    driver: bridge

    ipam:
      config:
        - subnet: 10.0.2.0/24